<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face { /* Usando fontes baixadas no computador */
            font-family: 'Antholia' ;
            src: url('fontes/Antholia Riechgan DEMO VERSION.otf') format('opentype'), url('fontes/Antholia Riechgan DEMO VERSION.ttf') format('truetype');
            /* Tipos de format()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)
            - svg
            */
            font-weight: normal;
            font-style: normal;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Antholia', 'Times New Roman', Times, serif;
            font-size: 8em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Nisi, aperiam. Nam, tempora culpa maxime corporis aliquam nisi voluptate unde quos iste delectus! Deserunt nemo quaerat, possimus placeat laudantium assumenda mollitia?</p>
</body>
</html>
