<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {/* BOX-LEVEL */
            /*display: inline;*/
            background-color: lightgray;
            height: 300px;
            width: 300px;

            /* border-width: 10px;
            border-style: solid;
            border-color: darkgray; */
            border: 10px solid darkgray;

            /*padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;*/
            padding: 10px; /* se todos valores iguais, basta digitar apenas um valor
            padding: 10px 20px|se eu coloco dois valores, o valor do 'top'='bottom' e 'right'='left' */

            /*margin-top: 20px;
            margin-right: auto;
            margin-bottom: 40px;
            margin-left: auto;*/
            margin: 20px auto 40px auto;
            /* margin: auto;  pra margin ficar no meio da tela, mesmo redimensionando */

           /*outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;*/
            outline: 5px dashed salmon;

            
        }
        a {/* INLINE-LEVEL */
            /*display: block;*/
            border-width: 10px;
            border-style: solid;
            border-color: red;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">Links são exemplos de caixa inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
