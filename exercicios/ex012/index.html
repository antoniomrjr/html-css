<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Vídeo hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor</p>

    <video width="560" height="359" controls preload="metadata" autoplay loop poster="imagens/thumb-meu-video.jpg"> <!--lembrar que os parâmetros são sempre dentro dessa tag e 'poster' é a thumb do video-->
        <source src="midia/meu-video-menor.mp4" type="video/mp4">
        <source src="midia/meu-video-menor.mkv" type="video/mkv">
        <source src="midia/meu-video-menor.webm" type="video/webm">
        <p>Seu navegador não tem compatibilidade com reprodução de vídeos.</p>
    </video> 

    <h1>Inserindo vídeos do Youtube</h1>
    
    <iframe width="560" height="359" src="https://www.youtube.com/embed/OzUnqQk4eOg" title="2D Animation Reel 2022" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>    
</body>
</html>
