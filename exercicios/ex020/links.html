<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
            /*  SELETORES PERSONALIZADOS
                #   = id
                .   = class
                :   = pseudo-class
                ::  = pseudo-element
                >   = children        
            */
        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited { /* links já visitados */
            color: darkred;
        }

        a:hover { /* passar o mouse por cima */
            color: black;
            text-decoration: underline;
        }

        a:active { /* quando fico com o clique pressionado */
            color: yellow;
        }
        
        .especial {
            background-color: rgba(139, 0, 0, 0.39);            
        }

        .especial::before {
            content: '» ';
        }

        /* pseudo elementos são com 2 : '::' */
        .especial::after {
            content: ' «';
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo" class="especial" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com" class="especial" target="_blank">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
